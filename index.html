<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Pengecekan Dino Bangas & Primbon</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #0f172a; /* Tailwind slate-900 */
            color: #f8fafc;
        }
        .gradient-text {
            background: linear-gradient(to right, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card-gradient {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            box-shadow:  5px 5px 15px #0a0f1c, -5px -5px 15px #141f38;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Constants
        const PASARAN_ARRAY = ['Legi', 'Pahing', 'Pon', 'Wage', 'Kliwon'];
        const HARI_ARRAY = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jum\'at', 'Sabtu'];
        const BULAN_JAWA = [
            'Suro', 'Sapar', 'Mulud', "Ba'da Mulud",
            'Jumadil Awal', 'Jumadil Akhir', 'Rejeb', 'Ruwah',
            'Poso', 'Sawal', 'Selo', 'Besar'
        ];

        // --- Core Logic Functions ---

        // Fungsi untuk mendapatkan detail penanggalan Jawa (Aproksimasi via kalender Hijriah)
        const getJavaneseDetails = (dateObj) => {
            // Epoch 1 Jan 1970 adalah Kamis Wage (Wage = index 3)
            const d1 = new Date(1970, 0, 1, 12, 0, 0); 
            const d2 = new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate(), 12, 0, 0);
            const diffDays = Math.round((d2 - d1) / (1000 * 60 * 60 * 24));

            let pasaranIndex = (3 + (diffDays % 5)) % 5;
            if (pasaranIndex < 0) pasaranIndex += 5;

            let dayIndex = dateObj.getDay();

            // Menggunakan formatter Hijriah untuk aproksimasi bulan dan tahun Jawa
            const formatter = new Intl.DateTimeFormat('en-US-u-ca-islamic', { month: 'numeric', year: 'numeric', day: 'numeric' });
            const parts = formatter.formatToParts(dateObj);
            
            const monthNum = parseInt(parts.find(p => p.type === 'month')?.value || 1);
            let yearNumStr = parts.find(p => p.type === 'relatedYear' || p.type === 'year')?.value || "1445";
            const yearNum = parseInt(yearNumStr.replace(/[^0-9]/g, ''));
            const dayNum = parseInt(parts.find(p => p.type === 'day')?.value || 1);

            return {
                hari: HARI_ARRAY[dayIndex],
                pasaran: PASARAN_ARRAY[pasaranIndex],
                tanggal: dayNum,
                bulan: BULAN_JAWA[monthNum - 1],
                tahun: yearNum
            };
        };

        // Fungsi mencari Pasaran pada 1 Suro tahun ini (untuk cek Pangkreman)
        const getPangkremanPasaran = (currentDate) => {
            let tempDate = new Date(currentDate.getTime());
            // Mundur maksimal 360 hari untuk mencari 1 Suro (1 Muharram)
            for(let i = 0; i < 360; i++) {
                const formatter = new Intl.DateTimeFormat('en-US-u-ca-islamic', { month: 'numeric', day: 'numeric' });
                const parts = formatter.formatToParts(tempDate);
                const month = parseInt(parts.find(p => p.type === 'month')?.value);
                const day = parseInt(parts.find(p => p.type === 'day')?.value);

                if (month === 1 && day === 1) {
                    const detail = getJavaneseDetails(tempDate);
                    return detail.pasaran;
                }
                tempDate.setDate(tempDate.getDate() - 1);
            }
            return null; // Fallback jika tidak ketemu
        };

        // Fungsi cek Dino Bangas berdasarkan gambar
        const checkBangas = (bulan, hari, pasaran) => {
            const combined = `${hari} ${pasaran}`.toUpperCase();
            
            const rules = [
                { bulan: ['Suro', 'Sapar', 'Mulud'], hari: ['SABTU LEGI', 'MINGGU LEGI'], arah: 'WETAN' },
                { bulan: ["Ba'da Mulud", 'Jumadil Awal', 'Jumadil Akhir'], hari: ['SENIN PAHING', 'SELASA PAHING'], arah: 'KIDUL' },
                { bulan: ['Rejeb', 'Ruwah', 'Poso'], hari: ['RABU PON', 'KAMIS PON'], arah: 'KULON' },
                { bulan: ['Sawal', 'Selo', 'Besar'], hari: ["JUM'AT WAGE", 'JUMAT WAGE'], arah: 'LOR' }
            ];

            for (let rule of rules) {
                if (rule.bulan.includes(bulan) && rule.hari.includes(combined)) {
                    return { isBangas: true, arah: rule.arah, desc: `Hari ini adalah Dino Bangas! Arah nogo tahun di ${rule.arah}.` };
                }
            }
            return { isBangas: false, arah: null, desc: 'Bukan Dino Bangas. Hari ini aman.' };
        };

        // Fungsi Rekomendasi berdasarkan input teks user
        const getRekomendasi = (pasaran) => {
            const data = {
                'Legi': { warna: 'PUTIH', arah: 'TIMUR', bg: 'bg-slate-100 text-slate-900', border: 'border-slate-300' },
                'Pahing': { warna: 'MERAH', arah: 'SELATAN', bg: 'bg-red-600 text-white', border: 'border-red-400' },
                'Pon': { warna: 'KUNING', arah: 'BARAT', bg: 'bg-yellow-400 text-slate-900', border: 'border-yellow-200' },
                'Wage': { warna: 'HITAM', arah: 'UTARA', bg: 'bg-black text-white', border: 'border-slate-700' },
                'Kliwon': { warna: 'NETRAL / BEBAS', arah: 'TENGAH', bg: 'bg-gradient-to-r from-teal-500 to-emerald-500 text-white', border: 'border-teal-300' }
            };
            return data[pasaran] || data['Kliwon'];
        };

        // --- Main Component ---
        const App = () => {
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [javaData, setJavaData] = useState(null);
            const [bangasData, setBangasData] = useState(null);
            const [pangkremanPasaran, setPangkremanPasaran] = useState(null);
            const [isPangkreman, setIsPangkreman] = useState(false);
            const [rekomendasi, setRekomendasi] = useState(null);

            useEffect(() => {
                const dateObj = new Date(selectedDate);
                
                // 1. Get Javanese Details
                const details = getJavaneseDetails(dateObj);
                setJavaData(details);

                // 2. Check Bangas
                const bangas = checkBangas(details.bulan, details.hari, details.pasaran);
                setBangasData(bangas);

                // 3. Check Pangkreman
                const pangkrem = getPangkremanPasaran(dateObj);
                setPangkremanPasaran(pangkrem);
                setIsPangkreman(details.pasaran === pangkrem);

                // 4. Get Recommendation
                setRekomendasi(getRekomendasi(details.pasaran));

            }, [selectedDate]);

            if (!javaData || !rekomendasi) return <div className="text-center mt-20">Memuat perhitungan...</div>;

            return (
                <div className="max-w-md mx-auto p-4 md:p-6 space-y-6 pb-12">
                    {/* Header */}
                    <div className="text-center space-y-2 mt-4">
                        <h1 className="text-3xl font-extrabold tracking-tight gradient-text">Primbon Bangas</h1>
                        <p className="text-slate-400 text-sm">Cek Otomatis Hari Bangas, Pangkreman & Saran Warna Pakaian</p>
                    </div>

                    {/* Date Picker */}
                    <div className="card-gradient rounded-2xl p-5 border border-slate-700">
                        <label className="block text-sm font-medium text-slate-400 mb-2">Pilih Tanggal:</label>
                        <input 
                            type="date" 
                            value={selectedDate}
                            onChange={(e) => setSelectedDate(e.target.value)}
                            className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500"
                        />
                    </div>

                    {/* Kalender Jawa Result */}
                    <div className="card-gradient rounded-2xl p-6 border border-slate-700 text-center relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-4 opacity-10">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        </div>
                        <h2 className="text-sm text-slate-400 font-semibold uppercase tracking-wider mb-1">Penanggalan Jawa</h2>
                        <div className="text-4xl font-black text-purple-400 mb-2">
                            {javaData.hari} {javaData.pasaran}
                        </div>
                        <div className="text-lg text-slate-300">
                            {javaData.tanggal} {javaData.bulan} {javaData.tahun}
                        </div>
                    </div>

                    {/* Alert Bangas & Pangkreman */}
                    <div className="space-y-4">
                        {/* Status Bangas */}
                        <div className={`rounded-2xl p-5 border ${bangasData.isBangas ? 'bg-red-900/40 border-red-500' : 'bg-emerald-900/30 border-emerald-500/50'}`}>
                            <div className="flex items-start space-x-3">
                                <div className={`p-2 rounded-full ${bangasData.isBangas ? 'bg-red-500/20 text-red-400' : 'bg-emerald-500/20 text-emerald-400'}`}>
                                    {bangasData.isBangas ? (
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                                    ) : (
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                                    )}
                                </div>
                                <div>
                                    <h3 className={`font-bold text-lg ${bangasData.isBangas ? 'text-red-400' : 'text-emerald-400'}`}>
                                        Status Dino Bangas
                                    </h3>
                                    <p className="text-slate-300 text-sm mt-1">{bangasData.desc}</p>
                                </div>
                            </div>
                        </div>

                        {/* Status Pangkreman */}
                        <div className={`rounded-2xl p-5 border ${isPangkreman ? 'bg-orange-900/40 border-orange-500' : 'bg-slate-800 border-slate-700'}`}>
                             <div className="flex items-start space-x-3">
                                <div className={`p-2 rounded-full ${isPangkreman ? 'bg-orange-500/20 text-orange-400' : 'bg-slate-700 text-slate-400'}`}>
                                     <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                                </div>
                                <div>
                                    <h3 className={`font-bold text-lg ${isPangkreman ? 'text-orange-400' : 'text-slate-200'}`}>
                                        Status Pangkreman
                                    </h3>
                                    <p className="text-slate-300 text-sm mt-1">
                                        {isPangkreman 
                                            ? `Hari ini adalah hari PANGKREMAN! (Pasaran 1 Suro tahun ini jatuh pada pasaran ${pangkremanPasaran})` 
                                            : `Aman dari Pangkreman. (Pasaran 1 Suro tahun ini jatuh pada ${pangkremanPasaran || '...'})`}
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Rekomendasi Baju */}
                    <div className="card-gradient rounded-2xl p-6 border border-slate-700">
                        <h3 className="text-center font-bold text-slate-300 mb-6 flex items-center justify-center space-x-2">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"></path></svg>
                            <span>Saran Penampilan (Pasaran {javaData.pasaran})</span>
                        </h3>
                        
                        <div className="grid grid-cols-2 gap-4">
                            <div className={`p-4 rounded-xl border flex flex-col items-center justify-center ${rekomendasi.bg} ${rekomendasi.border}`}>
                                <span className="text-xs font-semibold opacity-80 mb-1 uppercase tracking-wider">Warna Baju</span>
                                <span className="text-xl font-black">{rekomendasi.warna}</span>
                            </div>
                            <div className="p-4 rounded-xl border border-slate-600 bg-slate-800 flex flex-col items-center justify-center text-slate-200">
                                <span className="text-xs text-slate-400 font-semibold mb-1 uppercase tracking-wider">Tempat / Arah</span>
                                <span className="text-xl font-black">{rekomendasi.arah}</span>
                            </div>
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
