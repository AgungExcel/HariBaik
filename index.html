<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Primbon Bangas & Cek Weton</title>
<link rel="icon" type="image/png" href="haribaik.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
html,body{margin:0;padding:0;height:100dvh;overflow:hidden;background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#020617 100%);color:#f8fafc;font-family:Poppins,sans-serif}#root{height:100%;width:100%;display:flex;justify-content:center}.glass-panel{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);box-shadow:0 8px 32px rgba(0,0,0,.25)}.gradient-text{background:linear-gradient(to right,#fbbf24,#f59e0b,#ea580c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}.modal-overlay{animation:fadeIn .2s ease-out}.modal-content{animation:scaleUp .25s ease-out}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes scaleUp{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const PASARAN=['Legi','Pahing','Pon','Wage','Kliwon'];
const HARI=['Minggu','Senin','Selasa','Rabu','Kamis',"Jum'at",'Sabtu'];
const BULAN_JAWA=['Suro','Sapar','Mulud',"Ba\'da Mulud",'Jumadil Awal','Jumadil Akhir','Rejeb','Ruwah','Poso','Sawal','Selo','Besar'];
const NEPTU_HARI={'Minggu':5,'Senin':4,'Selasa':3,'Rabu':7,'Kamis':8,"Jum'at":6,'Sabtu':9};
const NEPTU_PASARAN={'Legi':5,'Pahing':9,'Pon':7,'Wage':4,'Kliwon':8};

const todayLocal=()=>{const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`};
const parseLocalDate=(s)=>{if(!s||!/^\d{4}-\d{2}-\d{2}$/.test(s))return null;const [y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d,12,0,0);if(Number.isNaN(dt.getTime()))return null;if(dt.getFullYear()!==y||dt.getMonth()!==m-1||dt.getDate()!==d)return null;return dt;};

const getJavaneseDetails=(dateObj)=>{const d1=new Date(1970,0,1,12,0,0);const d2=new Date(dateObj.getFullYear(),dateObj.getMonth(),dateObj.getDate(),12,0,0);const diff=Math.round((d2-d1)/86400000);let pi=(3+(diff%5))%5;if(pi<0)pi+=5;let parts=[];try{parts=new Intl.DateTimeFormat('en-US-u-ca-islamic',{month:'numeric',year:'numeric',day:'numeric'}).formatToParts(dateObj)}catch(e){};const mn=parseInt(parts.find(p=>p.type==='month')?.value||1);const yn=parseInt((parts.find(p=>p.type==='relatedYear'||p.type==='year')?.value||'1445').replace(/[^0-9]/g,''));const dn=parseInt(parts.find(p=>p.type==='day')?.value||1);return{hari:HARI[dateObj.getDay()],pasaran:PASARAN[pi],tanggal:dn,bulan:BULAN_JAWA[mn-1]||'-',tahun:yn};};
const getPangkremanPasaran=(currentDate)=>{let t=new Date(currentDate.getTime());for(let i=0;i<360;i++){const parts=new Intl.DateTimeFormat('en-US-u-ca-islamic',{month:'numeric',day:'numeric'}).formatToParts(t);const m=parseInt(parts.find(p=>p.type==='month')?.value);const d=parseInt(parts.find(p=>p.type==='day')?.value);if(m===1&&d===1)return getJavaneseDetails(t).pasaran;t.setDate(t.getDate()-1)}return null;};
const checkBangas=(bulan,hari,pasaran)=>{const c=`${hari} ${pasaran}`.toUpperCase();const rules=[{bulan:['Suro','Sapar','Mulud'],hari:['SABTU LEGI','MINGGU LEGI'],arah:'WETAN'},{bulan:["Ba\'da Mulud",'Jumadil Awal','Jumadil Akhir'],hari:['SENIN PAHING','SELASA PAHING'],arah:'KIDUL'},{bulan:['Rejeb','Ruwah','Poso'],hari:['RABU PON','KAMIS PON'],arah:'KULON'},{bulan:['Sawal','Selo','Besar'],hari:["JUM'AT WAGE",'JUMAT WAGE'],arah:'LOR'}];for(const r of rules){if(r.bulan.includes(bulan)&&r.hari.includes(c))return{isBangas:true,desc:`Hari ini Dino Bangas! Arah nogo tahun di ${r.arah}.`,arah:r.arah}}return{isBangas:false,desc:'Bukan Dino Bangas. Hari ini aman.',arah:null};};
const getRekomendasi=(p)=>({'Legi':{warna:'PUTIH',arah:'TIMUR',bg:'bg-white text-slate-900',border:'border-white'},'Pahing':{warna:'MERAH',arah:'SELATAN',bg:'bg-red-500 text-white',border:'border-red-400'},'Pon':{warna:'KUNING',arah:'BARAT',bg:'bg-yellow-400 text-slate-900',border:'border-yellow-300'},'Wage':{warna:'HITAM',arah:'UTARA',bg:'bg-neutral-900 text-white',border:'border-neutral-600'},'Kliwon':{warna:'NETRAL',arah:'TENGAH',bg:'bg-gradient-to-br from-indigo-500 to-purple-600 text-white',border:'border-indigo-400'}}[p]);
const HARI_TRAITS={'Minggu':['berwibawa, hangat, suka tampil','mudah memimpin','jaga gengsi dan kritik'],'Senin':['lembut, rapi, peka','teliti dan sabar','jangan mudah kepikiran'],'Selasa':['tegas, berani, cepat bergerak','kuat mengambil keputusan','kendalikan emosi'],'Rabu':['cerdas, komunikatif, strategis','pandai bicara dan membaca peluang','jangan plin-plan'],'Kamis':['tenang, bijak, bertanggung jawab','kuat menjaga amanah','jangan terlalu kaku'],"Jum'at":['bersih hati, spiritual, penyayang','mudah dipercaya','jangan memendam beban'],'Sabtu':['kuat, pekerja keras, mandiri','ulet dan tahan banting','kurangi keras kepala']};
const PAS_TRAITS={'Legi':['supel, manis tutur kata, suka damai','relasi, pelayanan, pendidikan'],'Pahing':['ambisius, percaya diri, energinya besar','dagang, promosi, kepemimpinan'],'Pon':['tenang, berhati-hati, berwibawa','aset, administrasi, strategi'],'Wage':['hemat, cekatan, realistis','teknis, operasional, usaha kecil'],'Kliwon':['mendalam, intuisi tajam, kuat batin','kreativitas, seni, konsultasi']};
const pancasuda=(n)=>({1:['Sri','rezeki dan keberuntungan'],2:['Lungguh','kedudukan dan kehormatan'],3:['Gedhong','kecukupan dan simpanan'],4:['Lara','ujian batin dan kepekaan'],0:['Pati','transformasi dan perlu kehati-hatian']}[n%5]);
const kategori=(n)=>n<=9?'Lembut & Adaptif':n<=13?'Seimbang & Produktif':n<=16?'Kuat & Berpengaruh':'Tinggi & Intens';
const wetonProfile=(dt)=>{const d=getJavaneseDetails(dt),nh=NEPTU_HARI[d.hari],np=NEPTU_PASARAN[d.pasaran],tot=nh+np,ht=HARI_TRAITS[d.hari],pt=PAS_TRAITS[d.pasaran],pc=pancasuda(tot);return{...d,nh,np,tot,ht,pt,pc,kat:kategori(tot),rek:getRekomendasi(d.pasaran)}};
const TABLE=[['Suro, Sapar, Mulud','Sabtu/Minggu Legi','Wetan'],["Ba\'da Mulud, Jum.Awal, Jum.Akhir",'Senin/Selasa Pahing','Kidul'],['Rejeb, Ruwah, Poso','Rabu/Kamis Pon','Kulon'],['Sawal, Selo, Besar',"Jum'at Wage",'Lor']];
const Card=({title,children})=><div className="rounded-2xl p-3 border bg-white/5 border-white/10 shadow-lg"><h4 className="text-[10px] font-black uppercase tracking-[.22em] text-amber-300 mb-1.5">{title}</h4><div className="text-[11px] sm:text-xs text-white/80 leading-relaxed">{children}</div></div>;
function App(){
 const [menu,setMenu]=useState('bangas'),[selectedDate,setSelectedDate]=useState(todayLocal()),[birthDate,setBirthDate]=useState('2000-01-01');
 const [java,setJava]=useState(null),[bangas,setBangas]=useState(null),[pangkrem,setPangkrem]=useState(null),[isP,setIsP]=useState(false),[rek,setRek]=useState(null),[weton,setWeton]=useState(null),[modal,setModal]=useState(false);
 useEffect(()=>{const dt=parseLocalDate(selectedDate);if(!dt)return;const d=getJavaneseDetails(dt);setJava(d);setBangas(checkBangas(d.bulan,d.hari,d.pasaran));const p=getPangkremanPasaran(dt);setPangkrem(p);setIsP(d.pasaran===p);setRek(getRekomendasi(d.pasaran));},[selectedDate]);
 useEffect(()=>{const dt=parseLocalDate(birthDate);if(!dt)return;setWeton(wetonProfile(dt));},[birthDate]);
 if(!java||!bangas||!rek||!weton)return <div className="mt-20 font-bold">Memuat...</div>;
 return <div className="w-full max-w-md h-full flex flex-col relative overflow-hidden">
  <div className="absolute top-[-10%] left-[-20%] w-[60%] h-[40%] bg-amber-600/20 blur-[100px] rounded-full"/><div className="absolute bottom-[-10%] right-[-20%] w-[60%] h-[40%] bg-indigo-600/20 blur-[100px] rounded-full"/>
  <div className="z-10 flex-1 flex flex-col p-3 sm:p-4 gap-3 min-h-0">
   <div className="flex items-center justify-between shrink-0"><div className="flex items-center gap-3"><img src="haribaik.png" className="w-12 h-12 rounded-2xl border border-amber-500/30 bg-black/40"/><div><h1 className="text-xl sm:text-2xl font-black gradient-text leading-none">Primbon Bangas</h1><p className="text-amber-200/70 text-[10px] mt-1 font-medium tracking-wide">BANGAS • WETON • PRIMBON</p></div></div><button onClick={()=>setModal(true)} className="p-2 rounded-xl bg-white/10 border border-white/20 text-amber-300 font-bold text-xs">Tabel</button></div>
   <div className="grid grid-cols-2 gap-2 glass-panel rounded-2xl p-1.5 shrink-0"><button onClick={()=>setMenu('bangas')} className={`rounded-xl py-2 text-xs font-black ${menu==='bangas'?'bg-amber-500 text-slate-950':'text-white/70'}`}>Dino Bangas</button><button onClick={()=>setMenu('weton')} className={`rounded-xl py-2 text-xs font-black ${menu==='weton'?'bg-amber-500 text-slate-950':'text-white/70'}`}>Cek Weton</button></div>
   {menu==='bangas'?<div className="flex-1 flex flex-col gap-3 min-h-0">
    <div className="glass-panel rounded-2xl px-4 py-3 flex items-center justify-between shrink-0"><label className="text-xs font-semibold">Pilih Tanggal:</label><input type="date" inputMode="numeric" value={selectedDate} onChange={e=>setSelectedDate(e.target.value)} className="bg-black/50 border border-white/20 rounded-xl px-3 py-1.5 text-xs font-semibold text-white"/></div>
    {!parseLocalDate(selectedDate)&&<div className="rounded-2xl p-3 border border-amber-400/30 bg-amber-500/10 text-amber-100 text-xs">Masukkan tanggal lengkap yang valid.</div>}
    <div className="glass-panel rounded-2xl p-4 text-center shrink-0"><h2 className="text-[10px] text-amber-200/60 font-bold uppercase tracking-[.3em] mb-1.5">Penanggalan Jawa</h2><div className="text-3xl font-black">{java.hari} <span className="text-amber-400">{java.pasaran}</span></div><div className="text-xs text-slate-300">{java.tanggal} {java.bulan} {java.tahun}</div></div>
    <div className={`rounded-2xl p-4 border flex gap-4 ${bangas.isBangas?'bg-red-900/50 border-red-500/50':'bg-emerald-900/30 border-emerald-500/30'}`}><div className="font-black text-lg">{bangas.isBangas?'⚠️':'✅'}</div><div><h3 className="font-bold text-sm">Status Dino Bangas</h3><p className="text-xs text-white/75 mt-1">{bangas.desc}</p></div></div>
    <div className={`rounded-2xl p-4 border flex gap-4 ${isP?'bg-orange-900/50 border-orange-500/50':'bg-white/5 border-white/10'}`}><div className="font-black text-lg">ℹ️</div><div><h3 className="font-bold text-sm">Status Pangkreman</h3><p className="text-xs text-white/75 mt-1">{isP?`Awas Pangkreman! (1 Suro = ${pangkrem})`:`Aman. (1 Suro = ${pangkrem||'...'})`}</p></div></div>
    <div className="glass-panel rounded-2xl p-3 shrink-0"><h3 className="text-center font-bold text-xs mb-3">Saran Pakaian</h3><div className="grid grid-cols-2 gap-3"><div className={`p-3 rounded-xl border text-center ${rek.bg} ${rek.border}`}><div className="text-[10px] font-bold">Warna</div><div className="text-lg font-black">{rek.warna}</div></div><div className="p-3 rounded-xl border border-white/20 bg-black/60 text-center"><div className="text-[10px] text-slate-400 font-bold">Arah</div><div className="text-lg font-black">{rek.arah}</div></div></div></div>
   </div>:<div className="flex-1 flex flex-col gap-3 min-h-0 overflow-y-auto no-scrollbar pb-1">
    <div className="glass-panel rounded-2xl px-4 py-3 flex items-center justify-between shrink-0"><label className="text-xs font-semibold">Tanggal Lahir:</label><input type="date" inputMode="numeric" value={birthDate} onChange={e=>setBirthDate(e.target.value)} className="bg-black/50 border border-white/20 rounded-xl px-3 py-1.5 text-xs font-semibold text-white"/></div>
    {!parseLocalDate(birthDate)&&<div className="rounded-2xl p-3 border border-amber-400/30 bg-amber-500/10 text-amber-100 text-xs">Masukkan tanggal lahir lengkap yang valid.</div>}
    <div className="glass-panel rounded-3xl p-4 text-center shrink-0"><h2 className="text-[10px] text-amber-200/60 font-bold uppercase tracking-[.3em] mb-2">Hasil Cek Weton Lahir</h2><div className="text-3xl font-black">{weton.hari} <span className="text-amber-400">{weton.pasaran}</span></div><div className="text-xs text-slate-300 mt-1">{weton.tanggal} {weton.bulan} {weton.tahun}</div><div className="grid grid-cols-3 gap-2 mt-4"><div className="rounded-2xl bg-black/40 border border-white/10 p-2"><div className="text-[9px] text-slate-400 font-bold">Neptu Hari</div><div className="text-xl font-black">{weton.nh}</div></div><div className="rounded-2xl bg-black/40 border border-white/10 p-2"><div className="text-[9px] text-slate-400 font-bold">Pasaran</div><div className="text-xl font-black">{weton.np}</div></div><div className="rounded-2xl bg-amber-500/20 border border-amber-400/30 p-2"><div className="text-[9px] text-amber-200 font-bold">Total</div><div className="text-xl font-black text-amber-300">{weton.tot}</div></div></div></div>
    <Card title="Sifat & Watak Utama">Weton {weton.hari} {weton.pasaran} menggambarkan pribadi yang {weton.ht[0]}. Pengaruh pasaran {weton.pasaran} menambah sifat {weton.pt[0]}.</Card>
    <Card title="Kelebihan / Bakat Alami">{weton.ht[1]}. Energi pasaran mendukung rezeki lewat bidang {weton.pt[1]}.</Card>
    <Card title="Tantangan Yang Perlu Dijaga">{weton.ht[2]}. Kuncinya menjaga keseimbangan, tidak terburu-buru, dan tetap rendah hati.</Card>
    <div className="grid grid-cols-2 gap-3"><div className="rounded-2xl p-3 border border-amber-400/30 bg-amber-500/10"><h4 className="text-[10px] font-black text-amber-300 uppercase">Naungan</h4><div className="text-xl font-black">{weton.pc[0]}</div><p className="text-[11px] text-white/70">{weton.pc[1]}</p></div><div className="rounded-2xl p-3 border border-indigo-400/30 bg-indigo-500/10"><h4 className="text-[10px] font-black text-indigo-300 uppercase">Kategori</h4><div className="text-sm font-black">{weton.kat}</div><p className="text-[11px] text-white/70">Gunakan energi weton sebagai pengingat diri.</p></div></div>
    <div className="glass-panel rounded-2xl p-3"><h3 className="text-center font-bold text-xs mb-3">Rekomendasi Primbon Weton</h3><div className="grid grid-cols-2 gap-3"><div className={`p-3 rounded-xl border text-center ${weton.rek.bg} ${weton.rek.border}`}><div className="text-[10px] font-bold">Warna Cocok</div><div className="text-base font-black">{weton.rek.warna}</div></div><div className="p-3 rounded-xl border border-white/20 bg-black/60 text-center"><div className="text-[10px] text-slate-400 font-bold">Arah Energi</div><div className="text-base font-black">{weton.rek.arah}</div></div></div></div>
    <Card title="Relasi, Rezeki & Saran"><p><b>Relasi:</b> cocok dengan komunikasi terbuka dan saling menghargai.</p><p className="mt-1"><b>Rezeki:</b> bidang {weton.pt[1]}.</p><p className="mt-2 text-amber-200/70 italic">Catatan: tafsir weton adalah warisan budaya/hiburan, bukan keputusan mutlak.</p></Card>
   </div>}
  </div>
  {modal&&<div className="absolute inset-0 z-50 flex items-center justify-center p-4 modal-overlay bg-black/80"><div className="glass-panel w-full max-w-sm rounded-3xl p-5 modal-content bg-[#1e1b4b]/90"><button onClick={()=>setModal(false)} className="float-right bg-white/10 rounded-full px-3 py-1">✕</button><h2 className="text-lg font-bold mb-4">Tabel Dino Bangas</h2><div className="rounded-xl overflow-hidden border border-white/10"><table className="w-full text-left text-xs"><thead className="bg-white/10 text-amber-300"><tr><th className="p-2">Bulan Jawa</th><th className="p-2">Hari</th><th className="p-2">Arah</th></tr></thead><tbody>{TABLE.map((r,i)=><tr key={i} className="border-t border-white/10"><td className="p-2">{r[0]}</td><td className="p-2 text-orange-300">{r[1]}</td><td className="p-2 text-amber-400 font-bold">{r[2]}</td></tr>)}</tbody></table></div></div></div>}
 </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
